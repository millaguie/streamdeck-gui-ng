name: MiniMax Usage Monitor
version: 1.0.0
description: Shows MiniMax Coding Plan consumption (prompts remaining, rolling window) with progress bars and reset times.
author: StreamDeck UI Community
entry_point: minimax_usage_plugin.py
license: MIT

lifecycle_mode: always_running
can_switch_page: false

max_retries: 5
retry_delay: 30

variables:
  - name: api_key
    type: password
    description: "MiniMax Coding Plan API key (leave empty to auto-read from opencode auth.json)"
    required: false

  - name: group_id
    type: string
    description: "MiniMax Group ID (from platform.minimax.io/user-center/basic-information)"
    required: true

  - name: opencode_auth_path
    type: file_path
    description: "Path to opencode auth.json (default ~/.local/share/opencode/auth.json)"
    required: false

  - name: poll_interval
    type: int
    description: Polling interval in seconds
    required: false
    default: 300

  - name: display_mode
    type: string
    description: "Display mode: 'compact' shows all models, 'rotate' cycles between models"
    required: false
    default: compact

  - name: rotate_interval
    type: int
    description: Seconds between view rotation (only used in rotate mode)
    required: false
    default: 5

icon: minimax_icon.png
