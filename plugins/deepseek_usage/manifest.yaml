name: DeepSeek Usage Monitor
version: 1.0.0
description: Shows DeepSeek API balance (total, granted, topped-up) with availability status.
author: StreamDeck UI Community
entry_point: deepseek_usage_plugin.py
license: MIT

lifecycle_mode: always_running
can_switch_page: false

max_retries: 5
retry_delay: 30

variables:
  - name: api_key
    type: password
    description: "DeepSeek API key (from platform.deepseek.com/api_keys)"
    required: false

  - name: opencode_auth_path
    type: file_path
    description: "Path to opencode auth.json (default ~/.local/share/opencode/auth.json)"
    required: false

  - name: poll_interval
    type: int
    description: Polling interval in seconds
    required: false
    default: 300

  - name: display_mode
    type: string
    description: "Display mode: 'compact' shows all balances, 'rotate' cycles between views"
    required: false
    default: compact

  - name: rotate_interval
    type: int
    description: Seconds between view rotation (only used in rotate mode)
    required: false
    default: 5

icon: deepseek_icon.png
