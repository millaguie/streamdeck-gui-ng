name: CrofAI Usage Monitor
version: 1.1.0
description: Shows CrofAI credits, usable requests, and top model usage when a session cookie is provided; falls back to service status (model count, cheapest pricing) without it.
author: StreamDeck UI Community
entry_point: crof_status_plugin.py
license: MIT

lifecycle_mode: always_running
can_switch_page: false

max_retries: 5
retry_delay: 30

variables:
  - name: api_key
    type: password
    description: "CrofAI API key (from crof.ai dashboard). Optional — /v1/models works without auth."
    required: false

  - name: session_cookie
    type: password
    description: "Paste the VALUE of the 'session' cookie from your browser (DevTools → Application/Storage → Cookies → crof.ai → row 'session' → copy the 'Value' column). It's a long string (100+ chars), typically starts with 'eyJ' or '.eJw'. Do NOT paste the URL or the cookie name."
    required: false

  - name: opencode_auth_path
    type: file_path
    description: "Path to opencode auth.json (default ~/.local/share/opencode/auth.json)"
    required: false

  - name: poll_interval
    type: int
    description: Polling interval in seconds
    required: false
    default: 600

  - name: display_mode
    type: string
    description: "Display mode: 'compact' shows status+models+price, 'rotate' cycles between views"
    required: false
    default: compact

  - name: rotate_interval
    type: int
    description: Seconds between view rotation (only used in rotate mode)
    required: false
    default: 5

icon: crof_icon.png
