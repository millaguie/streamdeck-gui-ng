name: GitHub Copilot Usage Monitor
version: 1.0.0
description: Shows GitHub Copilot premium request consumption for the current month with progress bars and reset date.
author: StreamDeck UI Community
entry_point: copilot_usage_plugin.py
license: MIT

lifecycle_mode: always_running
can_switch_page: false

max_retries: 5
retry_delay: 30

variables:
  - name: github_token
    type: password
    description: "GitHub PAT with 'user' scope (leave empty to use 'gh' CLI token)"
    required: false

  - name: github_username
    type: string
    description: GitHub username
    required: true

  - name: plan
    type: string
    description: "Copilot plan: 'free' (50), 'pro' (300), 'pro_plus' (1500), or a custom number"
    required: false
    default: pro

  - name: poll_interval
    type: int
    description: Polling interval in seconds
    required: false
    default: 600

icon: copilot_icon.png
