name: Claude Code Usage Monitor
version: 1.0.0
description: Shows Claude Code plan consumption (5h and 7d windows) and reset times. Reads OAuth credentials from ~/.claude/.credentials.json.
author: StreamDeck UI Community
entry_point: claude_usage_plugin.py
license: MIT

lifecycle_mode: always_running
can_switch_page: false

max_retries: 5
retry_delay: 30

variables:
  - name: poll_interval
    type: int
    description: Polling interval in seconds (minimum 300 recommended due to API rate limits)
    required: false
    default: 300

  - name: credentials_path
    type: file_path
    description: Path to Claude credentials file (default ~/.claude/.credentials.json)
    required: false

  - name: display_mode
    type: string
    description: "Display mode: 'compact' shows 5h/7d on one screen, 'rotate' cycles between views"
    required: false
    default: compact

  - name: rotate_interval
    type: int
    description: Seconds between view rotation (only used in rotate mode)
    required: false
    default: 5

icon: claude_icon.png
