name: Z.ai API Balance Monitor
version: 1.0.0
description: >
  Shows Z.ai (ZhipuAI) pay-as-you-go API balance (CNY).
  Uses the undocumented finance endpoint at open.bigmodel.cn.
  Auth requires JWT signed with your API secret.
author: StreamDeck UI Community
entry_point: zai_balance_plugin.py
license: MIT

lifecycle_mode: always_running
can_switch_page: false

max_retries: 5
retry_delay: 30

variables:
  - name: api_key
    type: password
    description: "Z.ai API key (format: id.secret). Leave empty to auto-read from opencode auth.json."
    required: false

  - name: opencode_auth_path
    type: file_path
    description: "Path to opencode auth.json (default ~/.local/share/opencode/auth.json)"
    required: false

  - name: poll_interval
    type: int
    description: Polling interval in seconds
    required: false
    default: 600

  - name: quota_sentinel_url
    type: url
    description: "Optional Quota Sentinel URL (e.g. http://localhost:7878). If set, fetches balance from Quota Sentinel instead of calling the API directly."
    required: false

icon: zai_balance_icon.png
