name: Chutes Balance Monitor
version: 1.0.0
description: Shows Chutes.ai account balance and quota usage.
author: StreamDeck UI Community
entry_point: chutes_usage_plugin.py
license: MIT

lifecycle_mode: always_running
can_switch_page: false

max_retries: 5
retry_delay: 30

variables:
  - name: api_key
    type: password
    description: "Chutes API key (from chutes.ai dashboard)"
    required: false

  - name: opencode_auth_path
    type: file_path
    description: "Path to opencode auth.json (default ~/.local/share/opencode/auth.json)"
    required: false

  - name: poll_interval
    type: int
    description: Polling interval in seconds
    required: false
    default: 300

  - name: display_mode
    type: string
    description: "Display mode: 'compact' shows balance + quota, 'rotate' cycles between views"
    required: false
    default: compact

  - name: rotate_interval
    type: int
    description: Seconds between view rotation (only used in rotate mode)
    required: false
    default: 5

  - name: quota_sentinel_url
    type: url
    description: "Optional Quota Sentinel URL (e.g. http://localhost:7878). If set, fetches usage from Quota Sentinel instead of calling the API directly."
    required: false

icon: chutes_icon.png
