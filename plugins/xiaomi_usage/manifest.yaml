name: Xiaomi MiMo Usage Monitor
version: 1.0.0
description: Shows Xiaomi MiMo Token Plan consumption (plan / compensation / monthly token windows) with progress bars. Requires a session cookie from platform.xiaomimimo.com (the tp-* API key is only valid for model calls).
author: StreamDeck UI Community
entry_point: xiaomi_usage_plugin.py
license: MIT

lifecycle_mode: always_running
can_switch_page: false

max_retries: 5
retry_delay: 30

variables:
  - name: session_cookie
    type: password
    description: "Session cookie from platform.xiaomimimo.com (DevTools → Application → Cookies). The Token Plan tp-* API key is rejected by the usage console — only the browser session cookie works."
    required: false

  - name: api_token
    type: password
    description: "Optional Xiaomi MiMo Token Plan API key (tp-…). Stored for sentinel fingerprinting only; leave empty to auto-read from opencode auth.json."
    required: false

  - name: opencode_auth_path
    type: file_path
    description: "Path to opencode auth.json (default ~/.local/share/opencode/auth.json). Used as a fallback source for the tp-* fingerprint."
    required: false

  - name: poll_interval
    type: int
    description: Polling interval in seconds (>=60).
    required: false
    default: 300

  - name: display_mode
    type: string
    description: "Display mode: 'compact' shows plan/compensation on one screen, 'rotate' cycles between views"
    required: false
    default: compact

  - name: rotate_interval
    type: int
    description: Seconds between view rotation (only used in rotate mode)
    required: false
    default: 5

  - name: quota_sentinel_url
    type: url
    description: "Optional Quota Sentinel URL (e.g. http://localhost:7878). If set, fetches usage from Quota Sentinel instead of calling the Xiaomi console directly."
    required: false

